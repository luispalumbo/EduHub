<!DOCTYPE html>
<html>
<head>
  <title>Password Defender Game</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
        <h1>Code & Discovery Education Hub</h1>
        <p>Explore, calculate, and test your knowledge!</p>
    </header>

    <main>
      <section class="tool-section">
                <h2>Password Defender</h2>
                <div class="card passwordDefender">
                  <p>Create a password that reaches 100 security points.</p>
                  <input type="password" id="password" placeholder="Enter password">
                  <button onclick="togglePassword()">Show/Hide</button>
                </div>

                <div id="scoreBox" class="card feedback">
                  <h2>Feedback</h2>
                  <p>Security Score: <span id="score">0</span>/100</p>
                  <div id="strengthBar"></div>
                  <ul id="feedback"></ul>
                </div>

                

            </section>
    </main>


  

  

  <script src="js/script.js"></script>
</body>
</html>
